  date_updated: '2026-05-04T20:28:42.488963'
  spec_sha256: 3b77a9557bf66246de64f515c9a702ff2f4eefe51d75f52f919532a4ade102d3

selected_notebooks:
  roman_all:
    repo: roman_notebooks
    root_directory: notebooks/
    include_subdirs:
      - '.*'
