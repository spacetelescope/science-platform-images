    This spec is for the production version of roman-22.0.0
  valid_on: 2026-04-06
  expires_on: 2026-10-06
  python_version: 3.12

repositories:
  roman_notebooks:
    url: https://github.com/spacetelescope/roman_notebooks.git
    ref: dev

system:
